name: Go Benchmark

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Benchmark
        run: go test -bench=. -benchmem -run=^$ ./...